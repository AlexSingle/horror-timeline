<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Таймлайн Ужасного марафона</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg: #0b0b0f;
    --accent: #b3122a;
    --accent2: #e8b923;
    --text: #eae6e1;
    --muted: #948e8a;
    --card: #17171d;
    --border: #2a2a33;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-image: radial-gradient(circle at 20% 0%, #1c0f12 0%, var(--bg) 45%);
  }
  header {
    text-align: center;
    padding: 48px 20px 28px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 2.2em;
    letter-spacing: 2px;
    margin: 0 0 8px;
    color: var(--accent2);
    text-shadow: 0 0 18px rgba(179,18,42,0.5);
    text-transform: uppercase;
  }
  header p {
    color: var(--muted);
    margin: 4px 0;
    min-height: 1.2em;
  }
  .timeline {
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 16px 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 46px;
  }
  .entry {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .date-badge {
    font-size: 0.95em;
    color: var(--accent2);
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 12px;
    text-align: center;
    position: relative;
    padding-bottom: 10px;
  }
  .date-badge::after {
    content: '';
    position: absolute;
    left: 50%;
    bottom: 0;
    transform: translateX(-50%);
    width: 34px;
    height: 2px;
    background: var(--accent);
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    width: 100%;
    box-shadow: 0 6px 24px rgba(0,0,0,0.45);
  }
  .carousel {
    position: relative;
    width: 100%;
    background: #000;
    aspect-ratio: 5/4;
    overflow: hidden;
  }
  .slides {
    display: flex;
    height: 100%;
    transition: transform .35s ease;
  }
  .slide {
    min-width: 100%;
    height: 100%;
  }
  .slide img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    cursor: zoom-in;
  }
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 24px;
    cursor: zoom-out;
    touch-action: pinch-zoom;
    overscroll-behavior: contain;
  }
  .lightbox img {
    touch-action: pinch-zoom;
  }
  .lightbox.open {
    display: flex;
  }
  .lightbox img {
    max-width: 92vw;
    max-height: 92vh;
    object-fit: contain;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
  }
  .lightbox-close {
    position: absolute;
    top: 16px;
    right: 24px;
    color: #fff;
    font-size: 2em;
    line-height: 1;
    cursor: pointer;
    opacity: 0.8;
    z-index: 1002;
  }
  .lightbox-close:hover {
    opacity: 1;
  }
  .lightbox-nav {
    z-index: 1001;
    width: 48px;
    height: 48px;
    font-size: 1.3em;
  }
  .lightbox-nav.prev { left: 12px; }
  .lightbox-nav.next { right: 12px; }
  .lightbox-count {
    bottom: auto;
    top: 16px;
    left: 24px;
    right: auto;
  }
  .car-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.45);
    color: #fff;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1em;
    line-height: 1;
  }
  .car-btn.prev { left: 10px; }
  .car-btn.next { right: 10px; }
  .car-btn:hover { background: var(--accent); }
  .count {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 0.78em;
    padding: 3px 9px;
    border-radius: 10px;
  }
  .dots {
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 6px;
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    cursor: pointer;
  }
  .dot.active { background: var(--accent2); }
  .carousel.no-poster {
    display: flex;
    align-items: center;
    justify-content: center;
    background: repeating-linear-gradient(135deg, #17171d, #17171d 10px, #1c1c22 10px, #1c1c22 20px);
  }
  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 24px;
    text-align: center;
  }
  .ph-icon { font-size: 2.2em; opacity: 0.6; }
  .ph-title { font-size: 1.15em; color: var(--text); font-weight: 600; }
  .ph-note { font-size: 0.8em; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  footer {
    text-align: center;
    color: var(--muted);
    padding: 30px;
    font-size: 0.85em;
  }
  .status {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
  }
</style>
</head>
<body>
<header>
  <h1>Таймлайн Ужасного марафона</h1>
  <p id="subtitle">Загрузка…</p>
</header>
<div class="timeline" id="timeline">
  <div class="status" id="status">Загружаем ленту из облака…</div>
</div>
<div class="lightbox" id="lightbox"><span class="lightbox-close">&times;</span><button class="car-btn prev lightbox-nav" id="lightbox-prev">&#10094;</button><img id="lightbox-img" src="" alt=""><button class="car-btn next lightbox-nav" id="lightbox-next">&#10095;</button><div class="count lightbox-count" id="lightbox-count"></div></div>
<script>
const BUCKET_URL = "https://storage.yandexcloud.net/horror-timeline/";
const LIST_URL = BUCKET_URL + "?list-type=2&prefix=posters/&max-keys=1000";
const ROMAN_MONTHS = ['','I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'];

function fmtDate(iso) {
  const [y, m, d] = iso.split('-');
  return `${parseInt(d,10)}.${ROMAN_MONTHS[parseInt(m,10)]}.${y}`;
}

function buildCard(entry, baseUrl) {
  const wrap = document.createElement('div');
  wrap.className = 'entry';

  const badge = document.createElement('div');
  badge.className = 'date-badge';
  badge.textContent = fmtDate(entry.event_date);
  wrap.appendChild(badge);

  const card = document.createElement('div');
  card.className = 'card';

  if (!entry.files || entry.files.length === 0) {
    card.innerHTML = `
      <div class="carousel no-poster">
        <div class="placeholder">
          <span class="ph-icon">&#127909;</span>
          <span class="ph-title"></span>
          <span class="ph-note">постер не найден</span>
        </div>
      </div>`;
    card.querySelector('.ph-title').textContent = entry.title;
    wrap.appendChild(card);
    return wrap;
  }

  const count = entry.files.length;
  const images = entry.files.map(fname =>
    baseUrl + 'posters/' + encodeURIComponent(entry.folder) + '/' + encodeURIComponent(fname));

  const carousel = document.createElement('div');
  carousel.className = 'carousel';
  carousel.dataset.count = count;

  let show = null; // assigned below when count > 1; used by both the carousel controls and the lightbox

  const slidesDiv = document.createElement('div');
  slidesDiv.className = 'slides';
  entry.files.forEach((fname, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === 0 ? ' active' : '');
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.src = images[i];
    img.addEventListener('click', () => openLightbox(images, i, (j) => { if (show) show(j); }));
    slide.appendChild(img);
    slidesDiv.appendChild(slide);
  });
  carousel.appendChild(slidesDiv);

  if (count > 1) {
    const prev = document.createElement('button');
    prev.className = 'car-btn prev';
    prev.innerHTML = '&#10094;';
    const next = document.createElement('button');
    next.className = 'car-btn next';
    next.innerHTML = '&#10095;';
    carousel.appendChild(prev);
    carousel.appendChild(next);

    const counter = document.createElement('div');
    counter.className = 'count';
    counter.textContent = `1/${count}`;
    carousel.appendChild(counter);

    const dots = document.createElement('div');
    dots.className = 'dots';
    for (let i = 0; i < count; i++) {
      const dot = document.createElement('span');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.dataset.i = i;
      dots.appendChild(dot);
    }
    carousel.appendChild(dots);

    let idx = 0;
    show = function(i) {
      idx = (i + count) % count;
      slidesDiv.style.transform = 'translateX(-' + (idx * 100) + '%)';
      dots.querySelectorAll('.dot').forEach((d, di) => d.classList.toggle('active', di === idx));
      counter.textContent = `${idx + 1}/${count}`;
    };
    prev.addEventListener('click', () => show(idx - 1));
    next.addEventListener('click', () => show(idx + 1));
    dots.querySelectorAll('.dot').forEach(d => d.addEventListener('click', () => show(parseInt(d.dataset.i, 10))));
  }

  card.appendChild(carousel);
  wrap.appendChild(card);
  return wrap;
}

const lightboxState = { images: [], index: 0, onNavigate: null };

function lightboxRender() {
  const count = lightboxState.images.length;
  document.getElementById('lightbox-img').src = lightboxState.images[lightboxState.index];
  const countEl = document.getElementById('lightbox-count');
  const prevBtn = document.getElementById('lightbox-prev');
  const nextBtn = document.getElementById('lightbox-next');
  const showNav = count > 1;
  countEl.style.display = showNav ? '' : 'none';
  prevBtn.style.display = showNav ? '' : 'none';
  nextBtn.style.display = showNav ? '' : 'none';
  if (showNav) countEl.textContent = `${lightboxState.index + 1}/${count}`;
  if (lightboxState.onNavigate) lightboxState.onNavigate(lightboxState.index);
}

function lightboxGo(delta) {
  const count = lightboxState.images.length;
  lightboxState.index = (lightboxState.index + delta + count) % count;
  lightboxRender();
}

function openLightbox(images, index, onNavigate) {
  lightboxState.images = images;
  lightboxState.index = index;
  lightboxState.onNavigate = onNavigate || null;
  lightboxRender();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

const lightboxEl = document.getElementById('lightbox');
document.getElementById('lightbox-prev').addEventListener('click', (e) => { e.stopPropagation(); lightboxGo(-1); });
document.getElementById('lightbox-next').addEventListener('click', (e) => { e.stopPropagation(); lightboxGo(1); });
lightboxEl.addEventListener('click', closeLightbox);
document.addEventListener('keydown', (e) => {
  if (!lightboxEl.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  else if (e.key === 'ArrowLeft') lightboxGo(-1);
  else if (e.key === 'ArrowRight') lightboxGo(1);
});

// Swipe support for touch devices: swipe = navigate, tap = close (handled by the click listener above).
let touchStartX = 0, touchStartY = 0, touchSwiped = false;
let lightboxPinching = false;
lightboxEl.addEventListener('touchstart', (e) => {
  if (e.touches.length > 1) { lightboxPinching = true; return; } // pinch-zoom: let the browser handle it
  lightboxPinching = false;
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchSwiped = false;
}, { passive: true });
lightboxEl.addEventListener('touchmove', (e) => {
  if (lightboxPinching || e.touches.length > 1) return;
  const t = e.touches[0];
  if (Math.abs(t.clientX - touchStartX) > 10) {
    touchSwiped = true;
    e.preventDefault();
  }
}, { passive: false });
lightboxEl.addEventListener('touchend', (e) => {
  if (lightboxPinching) { if (e.touches.length === 0) lightboxPinching = false; return; }
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0) lightboxGo(1); else lightboxGo(-1);
    touchSwiped = true; // suppress the close-on-tap click that follows
  }
});
lightboxEl.addEventListener('click', (e) => {
  if (touchSwiped) { e.stopImmediatePropagation(); touchSwiped = false; }
}, true);

async function listAllPosterKeys() {
  // Reads the bucket's object listing directly (S3 ListObjectsV2 XML API), paginating via
  // continuation tokens, and returns every key under posters/. No manifest.json involved —
  // the page always reflects whatever's actually in the bucket right now.
  const keys = [];
  let url = LIST_URL;
  while (true) {
    const resp = await fetch(url, { cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const xml = new DOMParser().parseFromString(await resp.text(), 'application/xml');
    if (xml.querySelector('parsererror')) throw new Error('bad XML from bucket listing');
    xml.querySelectorAll('Contents > Key').forEach(el => keys.push(el.textContent));
    const isTruncated = xml.querySelector('IsTruncated')?.textContent === 'true';
    const token = xml.querySelector('NextContinuationToken')?.textContent;
    if (!isTruncated || !token) break;
    url = LIST_URL + '&continuation-token=' + encodeURIComponent(token);
  }
  return keys;
}

function buildEntriesFromKeys(keys) {
  const prefix = 'posters/';
  const folders = {};
  keys.forEach(key => {
    if (!key.startsWith(prefix)) return;
    const rest = key.slice(prefix.length);
    const slash = rest.indexOf('/');
    if (slash === -1) return;
    const folder = rest.slice(0, slash);
    const filename = rest.slice(slash + 1);
    (folders[folder] = folders[folder] || []).push(filename);
  });

  const entries = [];
  Object.keys(folders).forEach(folder => {
    const m = folder.match(/^(\d{4}-\d{2}-\d{2})\s*-\s*(.+)$/);
    if (!m) return;
    const files = folders[folder].filter(f => f && f !== '.keep').sort();
    entries.push({ event_date: m[1], title: m[2], folder, files });
  });
  return entries;
}

async function main() {
  const timelineEl = document.getElementById('timeline');
  const subtitleEl = document.getElementById('subtitle');
  try {
    const keys = await listAllPosterKeys();
    const entries = buildEntriesFromKeys(keys).sort((a, b) => a.event_date.localeCompare(b.event_date));

    timelineEl.innerHTML = '';
    entries.forEach(entry => timelineEl.appendChild(buildCard(entry, BUCKET_URL)));

    const totalPosters = entries.reduce((n, e) => n + (e.files ? e.files.length : 0), 0);
    const first = entries.length ? fmtDate(entries[0].event_date) : '';
    const last = entries.length ? fmtDate(entries[entries.length - 1].event_date) : '';
    subtitleEl.textContent = `${entries.length} показов · ${totalPosters} постеров · ${first} — ${last}`;
  } catch (err) {
    timelineEl.innerHTML = '<div class="status">Не удалось загрузить ленту: ' + err.message + '</div>';
    subtitleEl.textContent = '';
    console.error(err);
  }
}

main();
</script>
</body>
</html>
